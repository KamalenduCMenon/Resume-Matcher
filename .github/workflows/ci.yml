# .github/workflows/ci.yml
# Runs on every push and pull request
# Validates: tests, coverage, security scan, dependency vulnerabilities

name: CI Pipeline

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio bandit safety httpx

      - name: Download spaCy model
        run: python -m spacy download en_core_web_lg

      - name: Run all tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Run Bandit security scan
        run: |
          bandit -r src/ -ll
        # -ll = only flag medium severity and above
        # Fails the pipeline if real security issues are found

      - name: Check for vulnerable dependencies
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
        continue-on-error: true
        # continue-on-error lets the pipeline finish even if
        # a dependency advisory is found, but still reports it